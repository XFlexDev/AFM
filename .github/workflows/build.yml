name: Build AFM Unsigned (auto-generate project)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode 26
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Install xcodeproj gem
      run: |
        gem install xcodeproj

    - name: Generate AFM.xcodeproj automatically
      run: |
        ruby << 'EOF'
        require 'xcodeproj'

        project_path = 'AFM.xcodeproj'
        project = Xcodeproj::Project.new(project_path)

        # Create main target (iOS App)
        target = project.new_target(:application, 'AFM', :ios, '16.0')

        # Add source files from root
        main_group = project.main_group
        sources = main_group.new_group('Sources')

        ['AFMApp.swift', 'ContentView.swift'].each do |file|
          if File.exist?(file)
            ref = sources.new_file(file)
            target.add_file_references([ref])
          end
        end

        # Add basic frameworks
        target.add_system_frameworks(['Foundation', 'SwiftUI', 'UIKit'])

        # Set some basic build settings
        target.build_configurations.each do |config|
          config.build_settings['SWIFT_VERSION'] = '6.0'
          config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
          config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
          config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
        end

        project.save
        puts "✅ Generated #{project_path} successfully"
        EOF

    - name: Build Unsigned
      run: |
        xcodebuild \
          -project AFM.xcodeproj \
          -scheme AFM \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          DEVELOPMENT_TEAM="" \
          build

    - name: Package Artifact
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "AFM.app" | head -1)
        if [ -n "$APP_PATH" ]; then
          cd "$(dirname "$APP_PATH")"
          zip -r $GITHUB_WORKSPACE/AFM-unsigned.app.zip AFM.app
          echo "✅ Unsigned AFM.app.zip ready"
        else
          echo "Build succeeded but .app not found in DerivedData"
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AFM-unsigned-build
        path: AFM-unsigned.app.zip
        retention-days: 14
