name: Build AFM Unsigned (auto-generate iOS project)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode 26
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Install xcodeproj gem
      run: gem install xcodeproj

    - name: Generate proper iOS AFM.xcodeproj
      run: |
        ruby << 'RUBY'
        require 'xcodeproj'

        project_path = 'AFM.xcodeproj'
        project = Xcodeproj::Project.new(project_path)

        # Luo iOS App target oikein
        target = project.new_target(:application, 'AFM', :ios, '16.0')
        target.platform = :ios
        target.deployment_target = '16.0'

        # Lisää sun Swift-tiedostot
        main_group = project.main_group
        sources_group = main_group.new_group('Sources')

        ['AFMApp.swift', 'ContentView.swift'].each do |filename|
          if File.exist?(filename)
            file_ref = sources_group.new_file(filename)
            target.add_file_references([file_ref])
          end
        end

        # Tärkeät iOS build settings
        target.build_configurations.each do |config|
          config.build_settings['SDKROOT'] = 'iphoneos'
          config.build_settings['SUPPORTED_PLATFORMS'] = 'iphoneos iphonesimulator'
          config.build_settings['TARGETED_DEVICE_FAMILY'] = '1,2'
          config.build_settings['SWIFT_VERSION'] = '6.0'
          config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
          config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
          config.build_settings['DEVELOPMENT_TEAM'] = ''
        end

        project.save
        puts "✅ iOS projekti generoitu onnistuneesti"
        RUBY

    - name: Build Unsigned
      run: |
        xcodebuild \
          -project AFM.xcodeproj \
          -scheme AFM \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          DEVELOPMENT_TEAM="" \
          build

    - name: Package Artifact
      if: success()
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "AFM.app" | head -1)
        if [ -n "$APP_PATH" ]; then
          cd "$(dirname "$APP_PATH")"
          zip -r $GITHUB_WORKSPACE/AFM-unsigned.app.zip AFM.app
          echo "✅ Unsigned build valmis"
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AFM-unsigned-build
        path: AFM-unsigned.app.zip
        retention-days: 14
