name: Build AFM Unsigned

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode 27
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '27'

    - name: Build Unsigned (Simulator)
      run: |
        xcodebuild \
          -project AFM.xcodeproj \
          -scheme AFM \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          DEVELOPMENT_TEAM="" \
          build

    - name: Package Artifact
      run: |
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "AFM.app" | head -1)
        if [ -n "$APP_PATH" ]; then
          cd "$(dirname "$APP_PATH")"
          zip -r $GITHUB_WORKSPACE/AFM-unsigned.app.zip AFM.app
          echo "✅ Unsigned build ready: AFM-unsigned.app.zip"
        else
          echo "App not found – check build logs"
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AFM-unsigned-build
        path: AFM-unsigned.app.zip
        retention-days: 14
